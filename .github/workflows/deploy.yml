name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - # actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Build and upload via Viam cloud runners
        env:
          VIAM_KEY_ID: ${{ secrets.VIAM_API_KEY_ID }}
          VIAM_KEY: ${{ secrets.VIAM_API_KEY }}
        run: |
          curl -fsSL https://storage.googleapis.com/packages.viam.com/apps/viam-cli/viam-cli-stable-linux-amd64 \
            -o /usr/local/bin/viam
          chmod +x /usr/local/bin/viam
          viam login api-key --key-id="$VIAM_KEY_ID" --key="$VIAM_KEY"
          viam module build start \
            --module=meta.json \
            --version=0.0.${{ github.run_number }} \
            --ref=${{ github.sha }} \
            --token=${{ secrets.GITHUB_TOKEN }}
