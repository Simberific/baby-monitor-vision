name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: ubuntu-24.04-arm
    steps:
      - # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - # actions/setup-go@v6.4.0
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Package
        run: tar -czf module.tar.gz meta.json bin/baby-monitor

      - name: Upload to Viam registry
        env:
          VIAM_KEY_ID: ${{ secrets.VIAM_API_KEY_ID }}
          VIAM_KEY: ${{ secrets.VIAM_API_KEY }}
        run: |
          curl -fsSL https://storage.googleapis.com/packages.viam.com/apps/viam-cli/viam-cli-stable-linux-arm64 \
            -o /usr/local/bin/viam
          chmod +x /usr/local/bin/viam
          viam login api-key --key-id="$VIAM_KEY_ID" --key="$VIAM_KEY"
          viam module upload \
            --module=meta.json \
            --platform=linux/arm64 \
            --version=0.0.${{ github.run_number }} \
            --upload=module.tar.gz
